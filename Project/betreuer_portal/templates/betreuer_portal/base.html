{% load static %}
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>KGL Betreuer Portal</title>
    <link rel="stylesheet" href="{% static 'betreuer_portal/css/portal.css' %}">
</head>
<body>
    <nav class="navbar">
        {% if user.is_authenticated %}
            <div class="nav-links">
                <a href="{% url 'betreuer_portal:dashboard' %}"> 🏠︎ Home</a>
                <a href="{% url 'betreuer_portal:jugendliche_list' %}">&#x1F465;&#xFE0E; Jugendliche</a>
            </div>
            <div class="user-info">
                <span>&#x1F464;&#xFE0E; {{ betreuer.vorname }} {{ betreuer.nachname }}</span>

                <!-- Logout Button Form -->
                <form method="post" action="{% url 'logout' %}" style="margin: 0; display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn-logout">Abmelden</button>
                </form>
            </div>
        {% else %}
            <div class="user-info">KGL Portal</div>
        {% endif %}
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
